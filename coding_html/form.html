<!DOCTYPE html>
<html>
<head>
    <title>Blockquote Example</title>
    <style>
        blockquote {
            border-left: 4px solid #ccc;
            padding-left: 20px;
            font-style: italic;
            margin: 20px 0;
        }
        footer {
            margin-top: 10px;
            display: block; /* Footers can contain block-level elements */
        }
    </style>
</head>
<body>

    <p>As Winston Churchill once said:</p>

    <blockquote cite="https://example.com/quote-source">
        <p>Success is not final, failure is not fatal: it is the courage to continue that counts.</p>
        <footer>— <cite>Winston Churchill</cite></footer>
    </blockquote>

    <p>This quote is often used to inspire perseverance.</p>

</body>
